<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindStrategyLab｜心智图谱</title>
    <meta
      name="description"
      content="MindStrategyLab｜心智图谱 — early-stage psychological strategy and self-reflection tools."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar__brand" role="banner">
          <div class="brand-mark" aria-hidden="true"></div>
          <div class="brand-text">
            <div class="brand-title" id="brandTitle">MindStrategyLab｜心智图谱</div>
            <div class="brand-subtitle" id="brandSubtitle">Psychological strategy tools</div>
          </div>
        </div>
        <div class="topbar__actions">
          <div class="lang-switch" role="group" id="langSwitch" aria-label="Language">
            <button class="pill pill--active" type="button" id="langEn" aria-pressed="true">English</button>
            <button class="pill" type="button" id="langZh" aria-pressed="false">中文</button>
          </div>
        </div>
      </header>

      <main class="main" id="main">
        <section class="card card--welcome" aria-labelledby="welcomeHeading">
          <h1 class="h1" id="welcomeHeading">Welcome to MindStrategyLab｜心智图谱</h1>
          <div class="welcome-body welcome-body--full" id="welcomeBodyFull"></div>
          <div class="welcome-body welcome-body--compact" id="welcomeBodyCompact"></div>
        </section>

        <section class="card" aria-labelledby="assessmentsHeading">
          <div class="section-title" id="assessmentsHeading">Assessments</div>
          <div class="catalog-grid" id="catalogCards"></div>
        </section>
      </main>

      <footer class="footer">
        <p class="footer-note" id="footerNote"></p>
        <div id="contactLine"></div>
      </footer>
    </div>

    <script src="./paymentLinks.js"></script>
    <script src="./promoCodes.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
