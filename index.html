<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindStrategyLab</title>
    <meta
      name="description"
      content="MindStrategyLab — psychological strategy tools for self-understanding and growth."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar__brand" role="banner">
          <div class="brand-mark" aria-hidden="true"></div>
          <div class="brand-text">
            <div class="brand-title" id="brandTitle">MindStrategyLab</div>
            <div class="brand-subtitle" id="brandSubtitle">Psychological strategy tools for self-understanding and growth</div>
          </div>
        </div>
        <div class="topbar__actions">
          <div class="lang-switch" role="group" id="langSwitch" aria-label="Language">
            <button class="pill pill--active" type="button" id="langEn" aria-pressed="true">English</button>
            <button class="pill" type="button" id="langZh" aria-pressed="false">中文</button>
          </div>
        </div>
      </header>

      <main class="main" id="main">
        <section class="card card--hero" aria-labelledby="heroTitle" id="hero">
          <h1 class="h1" id="heroTitle">Map your mind. Understand your patterns.</h1>
          <p class="hero-lead" id="heroLead"></p>
          <p class="hero-body" id="heroBody"></p>
          <p class="hero-disclaimer" id="heroDisclaimer"></p>
          <a class="hero-cta" href="#tools" id="heroCta">Explore tools</a>
          <p class="hero-note" id="heroNote"></p>
        </section>

        <section class="card card--info" aria-label="Additional information" id="info">
          <details class="accordion">
            <summary id="accordionStageTitle">Current stage</summary>
            <p id="accordionStageBody"></p>
          </details>
          <details class="accordion">
            <summary id="accordionPrivacyTitle">Data and privacy</summary>
            <p id="accordionPrivacyBody"></p>
          </details>
        </section>

        <section class="card" aria-labelledby="assessmentsHeading" id="tools">
          <h2 class="section-heading" id="assessmentsHeading">Explore the tools</h2>
          <p class="section-intro" id="assessmentsIntro"></p>
          <div class="catalog-grid" id="catalogCards"></div>
        </section>
      </main>

      <footer class="footer">
        <div id="contactLine"></div>
      </footer>
    </div>

    <script src="./paymentLinks.js"></script>
    <script src="./promoCodes.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
